<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Помощник 3.1</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background: #4285f4; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; color: #555; font-style: italic; }
        #result { margin-top: 20px; padding: 15px; background: #eef; border-radius: 8px; white-space: pre-wrap; line-height: 1.5; border-left: 5px solid #4285f4; }
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Решала задач 3.1 Flash Lite</h2>
    <input type="file" id="fileInput" accept="image/*">
    <img id="preview" src="#" alt="Предпросмотр">
    <button id="solveBtn">РЕШИТЬ ЗАДАЧУ</button>
    
    <div id="status">Готов к работе</div>
    <div id="result">Здесь будет решение...</div>
</div>

<script>
    // --- НАСТРОЙКИ ---
    const API_KEY = "ТВОЙ_КЛЮЧ_ИЗ_КОЛАБА"; 
    const MODEL_NAME = "gemini-3.1-flash-lite"; // Если будет ошибка "Model not found", пробуй "models/gemini-3.1-flash-lite"

    const fileInput = document.getElementById('fileInput');
    const solveBtn = document.getElementById('solveBtn');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const preview = document.getElementById('preview');

    // Показываем превью картинки
    fileInput.onchange = evt => {
        const [file] = fileInput.files;
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    }

    // Главная функция отправки
    solveBtn.onclick = async () => {
        if (!fileInput.files[0]) return alert("Сначала выбери фото!");

        solveBtn.disabled = true;
        status.innerText = "🚀 Gemini 3.1 думает...";
        resultDiv.innerText = "";

        try {
            const base64Image = await toBase64(fileInput.files[0]);
            const cleanBase64 = base64Image.split(',')[1];

            // Важно: используем v1beta для новых моделей
            const url = https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY};

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Ты — эксперт в решении задач. Посмотри на фото, распознай текст и дай максимально подробное решение с финальным ответом." },
                            { inline_data: { mime_type: "image/jpeg", data: cleanBase64 } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                console.error("Ошибка API:", data.error);
                status.innerText = "❌ Ошибка: " + data.error.message;
            } else if (data.candidates && data.candidates[0].content) {
                const text = data.candidates[0].content.parts[0].text;
                resultDiv.innerText = text;
                status.innerText = "✅ Решение готово!";
            } else {
                status.innerText = "⚠️ ИИ не смог дать ответ. Попробуй другое фото.";
            }

        } catch (err) {
            console.error("Критический сбой:", err);
            status.innerText = "🚨 Ошибка сети. Проверь консоль (F12).";
        } finally {
            solveBtn.disabled = false;
        }
    };
// Конвертер в Base64
    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
</script>

</body>
</html>
