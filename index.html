<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Помощник школьника</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 2rem; min-height: 100vh; background: #fff; }

  .header { background: #185FA5; color: #fff; padding: 1.2rem 1.25rem; display: flex; align-items: center; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

  .key-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: background 0.2s; flex-shrink: 0; }
  .key-btn:hover { background: rgba(255,255,255,0.25); }
  .key-btn.has-key { background: rgba(255,255,255,0.1); }

  .api-banner { background: #FFF3CD; border-bottom: 1px solid #FFD700; padding: 10px 1.25rem; font-size: 13px; color: #856404; display: flex; align-items: center; gap: 8px; }
  .api-banner a { color: #185FA5; cursor: pointer; text-decoration: underline; }

  .content { padding: 1.25rem; }

  .upload-zone { border: 2px dashed #B5D4F4; border-radius: 16px; padding: 2rem 1rem; text-align: center; cursor: pointer; background: #E6F1FB; margin-bottom: 1rem; transition: all 0.2s; position: relative; overflow: hidden; }
  .upload-zone:hover { border-color: #185FA5; background: #d4e8f7; }
  .upload-zone.has-image { border-style: solid; padding: 0; }
  .upload-zone img { width: 100%; border-radius: 14px; display: block; max-height: 280px; object-fit: contain; }
  .upload-icon-wrap { font-size: 40px; margin-bottom: 10px; }
  .upload-zone p { font-size: 15px; color: #185FA5; font-weight: 500; }
  .upload-zone span { font-size: 13px; color: #378ADD; display: block; margin-top: 4px; }
  #fileInput { display: none; }

  .btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: #185FA5; color: #fff; }
  .btn-primary:hover { background: #0C447C; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .btn-secondary { background: #f0f0f0; color: #333; margin-top: 10px; }
  .btn-secondary:hover { background: #e0e0e0; }

  .loading { text-align: center; padding: 2.5rem 1rem; }
  .spinner { width: 44px; height: 44px; border: 4px solid #E6F1FB; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 15px; color: #555; }
  .loading span { font-size: 13px; color: #aaa; margin-top: 6px; display: block; }

  .result { margin-top: 0; }
  .subject-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .subject-badge { background: #E6F1FB; color: #0C447C; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
  .class-badge { background: #EAF3DE; color: #27500A; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 20px; }

  .task-box { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; }
  .task-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .task-text { font-size: 15px; color: #222; line-height: 1.5; }

  .solution-title { font-size: 15px; font-weight: 600; color: #222; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .step { display: flex; gap: 12px; margin-bottom: 14px; }
  .step-num { min-width: 28px; height: 28px; background: #185FA5; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .step-text { font-size: 14px; color: #333; line-height: 1.6; padding-top: 4px; }

  .answer-box { background: #EAF3DE; border: 1px solid #C0DD97; border-radius: 12px; padding: 12px 16px; margin: 16px 0; }
  .answer-box .answer-label { font-size: 11px; color: #3B6D11; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .answer-box .answer-text { font-size: 16px; font-weight: 600; color: #1a4a0a; }

  .divider { height: 1px; background: #eee; margin: 16px 0; }

  .gdz-section-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .gdz-link { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #f9f9f9; border: 1px solid #e8e8e8; border-radius: 10px; margin-bottom: 8px; text-decoration: none; color: inherit; transition: background 0.15s; }
  .gdz-link:hover { background: #f0f0f0; }
  .gdz-link-icon { font-size: 20px; }
  .gdz-link-text { flex: 1; }
  .gdz-link-text strong { font-size: 14px; color: #185FA5; display: block; }
  .gdz-link-text span { font-size: 12px; color: #888; }
  .gdz-arrow { color: #aaa; font-size: 16px; }

  .error-box { background: #FCEBEB; border: 1px solid #F09595; border-radius: 12px; padding: 14px 16px; color: #A32D2D; font-size: 14px; line-height: 1.5; margin-top: 1rem; }

  .api-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .api-modal.open { display: flex; }
  .api-modal-box { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; }
  .api-modal-box h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .api-modal-box p { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }
  .api-modal-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; font-family: monospace; margin-bottom: 12px; }
  .api-modal-box input:focus { outline: none; border-color: #185FA5; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button { flex: 1; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
  .modal-cancel { background: #f0f0f0; color: #333; }
  .modal-save { background: #185FA5; color: #fff; }
  .modal-delete { background: #FCEBEB; color: #A32D2D; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📚</div>
      <div>
        <h1>Помощник школьника</h1>
        <p>Любой предмет · Любой класс</p>
      </div>
    </div>
    <button class="key-btn" id="keyBtn" onclick="openApiModal()">🔑 API ключ</button>
  </div>

  <div class="api-banner" id="apiBanner">
    ⚠️ API ключ не задан. <a onclick="openApiModal()">Нажми чтобы добавить</a>
  </div>

  <div class="content">
    <div id="screenUpload">
      <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleFile(event)">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon-wrap">📷</div>
        <p>Сфотографировать задание</p>
        <span>или нажми чтобы выбрать фото</span>
      </div>
      <button class="btn btn-primary" id="solveBtn" onclick="solve()" disabled>Решить задание</button>
    </div>

    <div id="screenLoading" style="display:none;">
      <div class="loading">
        <div class="spinner"></div>
        <p>Анализирую задание...</p>
        <span>Это займёт несколько секунд</span>
      </div>
    </div>

    <div id="screenResult" style="display:none;">
      <div class="result" id="resultContent"></div>
      <button class="btn btn-secondary" onclick="reset()">← Новое задание</button>
    </div>

    <div id="screenError" style="display:none;">
      <div class="error-box" id="errorText"></div>
      <button class="btn btn-secondary" style="margin-top:12px;" onclick="reset()">← Попробовать снова</button>
    </div>
  </div>
</div>

<div class="api-modal" id="apiModal">
  <div class="api-modal-box">
    <h3>API ключ Anthropic</h3>
    <p>Получи ключ на <strong>console.anthropic.com</strong> → API Keys → Create Key</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeApiModal()">Отмена</button>
      <button class="modal-delete" id="deleteKeyBtn" onclick="deleteApiKey()" style="display:none;">Удалить</button>
      <button class="modal-save" onclick="saveApiKey()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API_KEY_STORAGE = 'school_helper_api_key';
let currentImageBase64 = null;
let currentImageType = null;

function getApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ''; }

function openApiModal() {
  const existing = getApiKey();
  const input = document.getElementById('apiKeyInput');
  const deleteBtn = document.getElementById('deleteKeyBtn');
  // If key exists, show masked version and show delete button
  if (existing) {
    input.placeholder = existing.slice(0, 10) + '...' + existing.slice(-4);
    input.value = '';
    deleteBtn.style.display = 'block';
  } else {
    input.placeholder = 'sk-ant-api03-...';
    input.value = '';
    deleteBtn.style.display = 'none';
  }
  document.getElementById('apiModal').classList.add('open');
  setTimeout(() => input.focus(), 100);
}

function closeApiModal() { document.getElementById('apiModal').classList.remove('open'); }

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { closeApiModal(); return; } // nothing typed — just close
  if (!key.startsWith('sk-')) { alert('Ключ должен начинаться с sk-'); return; }
  localStorage.setItem(API_KEY_STORAGE, key);
  closeApiModal();
  updateBanner();
}

function deleteApiKey() {
  if (confirm('Удалить API ключ?')) {
    localStorage.removeItem(API_KEY_STORAGE);
    closeApiModal();
    updateBanner();
  }
}

function updateBanner() {
  const banner = document.getElementById('apiBanner');
  const keyBtn = document.getElementById('keyBtn');
  if (getApiKey()) {
    banner.style.display = 'none';
    keyBtn.textContent = '🔑 Сменить ключ';
    keyBtn.classList.add('has-key');
  } else {
    banner.style.display = 'flex';
    keyBtn.textContent = '🔑 API ключ';
    keyBtn.classList.remove('has-key');
  }
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataUrl = ev.target.result;
    currentImageType = file.type || 'image/jpeg';
    currentImageBase64 = dataUrl.split(',')[1];
    const zone = document.getElementById('uploadZone');
    zone.innerHTML = `<img src="${dataUrl}" alt="задание">`;
    zone.classList.add('has-image');
    zone.onclick = null;
    document.getElementById('solveBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function show(id) {
  ['screenUpload','screenLoading','screenResult','screenError'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function reset() {
  currentImageBase64 = null;
  currentImageType = null;
  const zone = document.getElementById('uploadZone');
  zone.innerHTML = `<div class="upload-icon-wrap">📷</div><p>Сфотографировать задание</p><span>или нажми чтобы выбрать фото</span>`;
  zone.classList.remove('has-image');
  zone.onclick = () => document.getElementById('fileInput').click();
  document.getElementById('fileInput').value = '';
  document.getElementById('solveBtn').disabled = true;
  show('screenUpload');
}

function buildGdzLinks(subject, taskText) {
  const q = encodeURIComponent(taskText.slice(0, 80));
  const subj = encodeURIComponent(subject);
  return [
    { icon: '📖', name: 'gdz.ru', desc: 'Поиск по ГДЗ', url: `https://gdz.ru/search/?search=${q}` },
    { icon: '🔍', name: 'resheba.ru', desc: 'Решебник онлайн', url: `https://resheba.ru/search?q=${q}` },
    { icon: '📝', name: 'Яндекс', desc: `Найти в ГДЗ: ${subject}`, url: `https://yandex.ru/search/?text=${subj}+ГДЗ+${q}` },
  ];
}

function renderResult(data) {
  const { subject, grade, task, steps, answer } = data;
  const links = buildGdzLinks(subject, task);

  let stepsHtml = '';
  if (Array.isArray(steps)) {
    steps.forEach((s, i) => {
      stepsHtml += `<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`;
    });
  }

  let gdz = '';
  links.forEach(l => {
    gdz += `<a class="gdz-link" href="${l.url}" target="_blank">
      <span class="gdz-link-icon">${l.icon}</span>
      <div class="gdz-link-text"><strong>${l.name}</strong><span>${l.desc}</span></div>
      <span class="gdz-arrow">›</span>
    </a>`;
  });

  document.getElementById('resultContent').innerHTML = `
    <div class="subject-row">
      <span class="subject-badge">${subject}</span>
      ${grade ? `<span class="class-badge">${grade} класс</span>` : ''}
    </div>
    <div class="task-box">
      <div class="task-label">Задание</div>
      <div class="task-text">${task}</div>
    </div>
    <div class="solution-title">📋 Решение</div>
    ${stepsHtml}
    ${answer ? `<div class="answer-box"><div class="answer-label">Ответ</div><div class="answer-text">${answer}</div></div>` : ''}
    <div class="divider"></div>
    <div class="gdz-section-title">🔗 Поиск в ГДЗ</div>
    ${gdz}
  `;
}

async function solve() {
  const apiKey = getApiKey();
  if (!apiKey) { openApiModal(); return; }
  if (!currentImageBase64) return;

  show('screenLoading');

  const prompt = `Ты помощник школьника. Внимательно посмотри на изображение с заданием.

Определи:
1. Предмет (математика, русский язык, физика, химия, история, английский, биология, и т.д.)
2. Класс обучения (если можно определить)
3. Точный текст задания
4. Пошаговое решение (каждый шаг отдельно, понятным языком для ребёнка)
5. Итоговый ответ

Ответь СТРОГО в формате JSON (без markdown, без \`\`\`):
{
  "subject": "название предмета",
  "grade": "номер класса или null",
  "task": "точный текст задания",
  "steps": ["шаг 1", "шаг 2", "шаг 3"],
  "answer": "итоговый ответ"
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentImageType, data: currentImageBase64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'Ошибка API');
    }

    const data = await response.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    show('screenResult');
    renderResult(parsed);
  } catch (err) {
    show('screenError');
    document.getElementById('errorText').innerHTML = `<strong>Ошибка:</strong> ${err.message}<br><br>Проверь правильность API ключа и попробуй снова. <a style="color:#185FA5;cursor:pointer;" onclick="openApiModal()">Сменить ключ →</a>`;
  }
}

updateBanner();
</script>
</body>
</html>
