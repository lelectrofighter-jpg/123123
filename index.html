<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Помощник школьника 3.1</title>
<style>
  /* Стили оставляю без изменений, как в вашем исходнике */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 2rem; min-height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
  .header { background: #185FA5; color: #fff; padding: 1.2rem 1.25rem; display: flex; align-items: center; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .key-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: background 0.2s; flex-shrink: 0; }
  .api-banner { background: #FFF3CD; border-bottom: 1px solid #FFD700; padding: 10px 1.25rem; font-size: 13px; color: #856404; display: flex; align-items: center; gap: 8px; }
  .api-banner a { color: #185FA5; cursor: pointer; text-decoration: underline; font-weight: bold; }
  .free-badge { background: #EAF3DE; border-bottom: 1px solid #C0DD97; padding: 8px 1.25rem; font-size: 12px; color: #27500A; text-align: center; }
  .content { padding: 1.25rem; }
  .upload-zone { border: 2px dashed #B5D4F4; border-radius: 16px; padding: 2.5rem 1rem; text-align: center; cursor: pointer; background: #E6F1FB; margin-bottom: 1.5rem; transition: all 0.2s; overflow: hidden; }
  .upload-zone.has-image { border-style: solid; padding: 0; background: #000; }
  .upload-zone img { width: 100%; border-radius: 14px; display: block; max-height: 350px; object-fit: contain; }
  .upload-icon-wrap { font-size: 44px; margin-bottom: 12px; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: #185FA5; color: #fff; }
  .btn-primary:disabled { background: #ccc; }
  .btn-secondary { background: #f0f0f0; color: #333; margin-top: 12px; }
  .spinner { width: 48px; height: 48px; border: 4px solid #E6F1FB; border-top-color: #185FA5; border-radius: 50%; animation: spin 1s infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .subject-badge { background: #185FA5; color: #fff; font-size: 13px; padding: 5px 14px; border-radius: 20px; }
  .task-box { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 12px; padding: 14px; margin-bottom: 20px; }
  .answer-box { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 12px; padding: 16px; }
  .api-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 100; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
  .api-modal.open { display: flex; }
  .api-modal-box { background: #fff; border-radius: 20px; padding: 1.75rem; width: 100%; max-width: 400px; }
  .error-box { background: #FFF1F2; border: 1px solid #FECDD3; padding: 16px; color: #BE123C; border-radius: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">🎓</div>
      <div>
        <h1>Школьный Помощник</h1>
        <p>ИИ решение задач (Flash-Lite 3.1)</p>
      </div>
    </div>
    <button class="key-btn" id="keyBtn" onclick="openApiModal()">⚙️</button>
  </div>

  <div class="free-badge">Используется сверхбыстрая модель Gemini 3.1 Flash-Lite</div>

  <div class="api-banner" id="apiBanner">
    ⚠️ Ключ не настроен. <a onclick="openApiModal()">Добавить ключ</a>
  </div>

  <div class="content">
    <div id="screenUpload">
      <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleFile(event)">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon-wrap">📸</div>
        <p>Загрузить фото задания</p>
        <span>Нажмите сюда или сделайте снимок</span>
      </div>
      <button class="btn btn-primary" id="solveBtn" onclick="solve()" disabled>
        ✨ Решить задание
      </button>
    </div>

    <div id="screenLoading" style="display:none;">
      <div class="loading" style="text-align: center; padding: 3rem 1rem;">
        <div class="spinner"></div>
        <p>Изучаю задание (v3.1)...</p>
        <span id="loadingStatus">Обработка данных...</span>
      </div>
    </div>

    <div id="screenResult" style="display:none;">
      <div id="resultContent"></div>
      <button class="btn btn-secondary" onclick="reset()">← Другое задание</button>
    </div>

    <div id="screenError" style="display:none;">
      <div class="error-box" id="errorText"></div>
      <button class="btn btn-secondary" style="margin-top:16px;" onclick="reset()">← Попробовать еще раз</button>
    </div>
  </div>
</div>

<div class="api-modal" id="apiModal">
  <div class="api-modal-box">
    <h3>Настройка API ключа</h3>
    <input type="password" id="apiKeyInput" style="width:100%; padding:14px; margin: 15px 0;" placeholder="AIzaSy...">
    <div style="display:flex; gap:10px;">
      <button onclick="closeApiModal()" style="flex:1; padding:10px;">Отмена</button>
      <button onclick="saveApiKey()" style="flex:1; padding:10px; background:#185FA5; color:#fff; border:none; border-radius:8px;">Сохранить</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'school_gemini_key_v6';
let imgBase64 = null;

function getKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
function openApiModal() { document.getElementById('apiModal').classList.add('open'); }
function closeApiModal() { document.getElementById('apiModal').classList.remove('open'); }
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) localStorage.setItem(STORAGE_KEY, key);
  closeApiModal();
  updateBanner();
}
function updateBanner() {
  const hasKey = !!getKey();
  document.getElementById('apiBanner').style.display = hasKey ? 'none' : 'flex';
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    imgBase64 = ev.target.result.split(',')[1];
    document.getElementById('uploadZone').innerHTML = `<img src="${ev.target.result}" style="width:100%">`;
    document.getElementById('solveBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function show(id) {
  ['screenUpload','screenLoading','screenResult','screenError'].forEach(s =>
    document.getElementById(s).style.display = s === id ? 'block' : 'none'
  );
}

function reset() {
  imgBase64 = null;
  document.getElementById('uploadZone').innerHTML = `📸 <p>Загрузить фото</p>`;
  document.getElementById('solveBtn').disabled = true;
  show('screenUpload');
}

async function solve() {
  const key = getKey();
  if (!key) { openApiModal(); return; }
  
  show('screenLoading');
  
  const prompt = `Ты школьный репетитор. Реши задание на картинке. Верни результат СТРОГО в формате JSON:
  {"subject": "предмет", "grade": "класс", "task": "текст", "steps": ["шаг 1"], "answer": "ответ"}`;

  try {
    // ОБНОВЛЕННЫЙ URL ДЛЯ GEMINI 3.1 FLASH-LITE
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${key}`;
    
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ inline_data: { mime_type: "image/jpeg", data: imgBase64 } }, { text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" }
      })
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error?.message || 'Ошибка API');

    const data = JSON.parse(result.candidates[0].content.parts[0].text);
    renderResult(data);
    show('screenResult');
  } catch (err) {
    document.getElementById('errorText').innerText = err.message;
    show('screenError');
  }
}

function renderResult(data) {
  document.getElementById('resultContent').innerHTML = `
    <div class="subject-badge">${data.subject}</div>
    <div class="task-box">${data.task}</div>
    <div class="answer-box"><strong>Ответ:</strong> ${data.answer}</div>
  `;
}
updateBanner();
</script>
</body>
</html>
